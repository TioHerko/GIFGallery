# This workflow will build a Swift project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-swift

name: Swift client

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: macos-26
    permissions:
      contents: write   # required to create releases / tags

    steps:
      - uses: actions/checkout@v4
        with:
          node-version: "24"
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - name: Build
        run: ./build-release.sh --arch x86_64 --arch arm64
        working-directory: ./clients/macos/
      - name: Package release
        uses: L-Super/create-dmg-actions@v1
        with:
          dmg_name: GIFGalleryClient
          src_dir: ./clients/macos/build/GIFGallery.app
          background: ./clients/macos/bg.svg
      - name: Show path
        run: echo '${{ github.workspace }}/${{ steps.create-dmg.outputs.dmg_path }}'
      - name: "Upload macOS Build Artifact"
        uses: actions/upload-artifact@v7
        with:
          name: GIFGallery
          path: ${{ github.workspace }}/${{ steps.create-dmg.outputs.dmg_path }}/GIFGalleryClient.dmg
          archive: false
      - name: Create a draft release
        # Only publish releases for pushes to main, not for pull requests.
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          # github.ref on a branch push is "refs/heads/main", which is not a
          # valid tag name, so derive a unique tag from the run number instead.
          tag_name: build-${{ github.run_number }}
          name: Release build-${{ github.run_number }}
          draft: true
          prerelease: false
          files: ${{ github.workspace }}/GIFGalleryClient.dmg
          body: |
            Built artifacts for GIF Gallery (the macOS application and corresponding container)
