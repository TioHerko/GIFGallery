# This workflow will build a Swift project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-swift

name: Swift client

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: macos-26
    permissions:
      contents: write # required to create releases / tags

    steps:
      - uses: actions/checkout@v4
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - name: Build
        run: ./build-release.sh --arch x86_64 --arch arm64
        working-directory: ./clients/macos/

      # ── Signing & notarization ──────────────────────────────────────────
      # Only sign/notarize on pushes to main, where the secrets are available.
      # Pull requests (especially from forks) cannot read secrets, so they
      # build unsigned and skip every step below guarded by this same `if`.
      - name: Set up signing keychain
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          MACOS_CERT_P12_BASE64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
        run: |
          chmod +x .github/workflows/ephemeral_keychain.sh
          .github/workflows/ephemeral_keychain.sh

      - name: Detect signing identity
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          IDENTITY=$(security find-identity -v -p codesigning build.keychain \
            | grep "Developer ID Application" | head -1 | sed -E 's/.*"(.*)"/\1/')
          if [ -z "$IDENTITY" ]; then
            echo "::error::No 'Developer ID Application' identity found in the keychain."
            security find-identity -v -p codesigning build.keychain
            exit 1
          fi
          echo "Using signing identity: $IDENTITY"
          echo "SIGN_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"

      - name: Codesign app (Hardened Runtime)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        working-directory: ./clients/macos
        run: |
          # The Team ID never lives in the repo; recover it from the signing
          # identity name, e.g. "Developer ID Application: Name (TEAMID)".
          TEAM_ID=$(echo "$SIGN_IDENTITY" | sed -E 's/.*\(([A-Z0-9]+)\)$/\1/')
          chmod +x make-entitlements.sh
          ./make-entitlements.sh "$TEAM_ID" build/entitlements
          # Sign inside-out. The share extension gets its own (sandboxed)
          # entitlements first — `--deep` would clobber them with the app's.
          codesign --force --options runtime --timestamp \
            --entitlements build/entitlements/appex.entitlements \
            --sign "$SIGN_IDENTITY" \
            "build/GIF Lobster.app/Contents/PlugIns/GIF Lobster Share.appex"
          codesign --force --options runtime --timestamp \
            --entitlements build/entitlements/app.entitlements \
            --sign "$SIGN_IDENTITY" "build/GIF Lobster.app"
          codesign --verify --strict --verbose=2 "build/GIF Lobster.app"

      - name: Decode notary API key
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          APPLE_API_KEY_P8_BASE64: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
        run: |
          echo "$APPLE_API_KEY_P8_BASE64" | base64 --decode > "$RUNNER_TEMP/api_key.p8"

      - name: Notarize and staple app
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        working-directory: ./clients/macos
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
        run: |
          ditto -c -k --keepParent "build/GIF Lobster.app" "$RUNNER_TEMP/GIF Lobster.zip"
          xcrun notarytool submit "$RUNNER_TEMP/GIF Lobster.zip" \
            --key "$RUNNER_TEMP/api_key.p8" \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER_ID" \
            --wait
          # Staple the ticket into the .app so Gatekeeper validates it offline.
          xcrun stapler staple "build/GIF Lobster.app"

      - name: Package release
        working-directory: ./clients/macos
        run: |
          # Build the DMG with hdiutil directly. The previous third-party
          # action did an unquoted `cd $src_dir`, which breaks on the space in
          # "GIF Lobster.app"; hdiutil with quoted paths handles it fine.
          STAGE="$RUNNER_TEMP/dmg-stage"
          rm -rf "$STAGE"
          mkdir -p "$STAGE"
          cp -R "build/GIF Lobster.app" "$STAGE/"
          ln -s /Applications "$STAGE/Applications"   # drag-to-install target
          hdiutil create -volname "GIF Lobster" -srcfolder "$STAGE" \
            -ov -format UDZO "$GITHUB_WORKSPACE/GIF Lobster.dmg"

      - name: Sign, notarize and staple DMG
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
        run: |
          # The Package release step wrote the DMG to the workspace root.
          DMG="$GITHUB_WORKSPACE/GIF Lobster.dmg"
          codesign --force --timestamp --sign "$SIGN_IDENTITY" "$DMG"
          xcrun notarytool submit "$DMG" \
            --key "$RUNNER_TEMP/api_key.p8" \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER_ID" \
            --wait
          xcrun stapler staple "$DMG"
          # Remove the decoded private key from the runner.
          rm -f "$RUNNER_TEMP/api_key.p8"

      - name: "Upload macOS Build Artifact"
        uses: actions/upload-artifact@v7
        with:
          name: GIF Lobster
          path: ${{ github.workspace }}/GIF Lobster.dmg
          archive: false
      - name: Create a draft release
        # Only publish releases for pushes to main, not for pull requests.
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          # github.ref on a branch push is "refs/heads/main", which is not a
          # valid tag name, so derive a unique tag from the run number instead.
          tag_name: build-${{ github.run_number }}
          name: Release build-${{ github.run_number }}
          draft: true
          prerelease: false
          files: ${{ github.workspace }}/GIF Lobster.dmg
          body: |
            Built artifacts for GIF Lobster (the macOS application).
            Signed with Developer ID and notarized by Apple.
