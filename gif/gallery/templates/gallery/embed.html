{% load static %}<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ gif.title }}</title>
    <link rel="icon" href="{% static 'gallery/favicon.ico' %}" sizes="48x48" />
    <link rel="icon" type="image/png" sizes="32x32" href="{% static 'gallery/favicon-32.png' %}" />

    <!-- Open Graph -->
    <meta property="og:title" content="{{ gif.title }}" />
    <meta property="og:type" content="video.other" />
    <meta property="og:image" content="{{ gif_url }}" />
    <meta property="og:image:type" content="image/gif" />
    <meta property="og:url" content="{{ embed_url }}" />

    <!-- Twitter / generic -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="{{ gif.title }}" />
    <meta name="twitter:image" content="{{ gif_url }}" />
    <meta name="twitter:image:src" content="{{ gif_url }}" />

    <!-- Apple Messages -->
    <meta property="og:image:alt" content="{{ gif.title }}" />
  </head>
  <body
    style="
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #000;
    "
  >
    <img
      src="{{ gif_url }}"
      alt="{{ gif.title }}"
      style="max-width: 100%; max-height: 100vh"
    />
  </body>
</html>
